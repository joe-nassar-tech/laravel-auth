name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  sqlite:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3']
    name: Pest (PHP ${{ matrix.php }}, sqlite)
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo_sqlite, sqlite3, bcmath, intl
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: vendor/bin/pest

  mysql-strict:
    runs-on: ubuntu-latest
    name: Pest (PHP 8.3, MySQL strict)
    # Runs the whole suite against a strict MySQL. This is the job that guards
    # strict-engine regressions such as the auth_otp_codes.type column, which
    # only rejected the 2FA OTP purposes on strict MySQL / PostgreSQL.
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: laravel_auth_test
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_mysql, bcmath, intl
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run tests (strict MySQL)
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: laravel_auth_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: vendor/bin/pest

  audit:
    runs-on: ubuntu-latest
    name: composer audit
    # Release-gate check (v2.7.1): fails the build if any installed dependency
    # has a known advisory on Packagist. Mirrors the security-review checklist.
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, bcmath, intl
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: composer audit
        run: composer audit
